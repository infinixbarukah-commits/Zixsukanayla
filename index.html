<!<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>For Adek ❤️</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:linear-gradient(135deg,#ff9ecf,#ffd6e7);
font-family:Arial,sans-serif;
overflow:hidden;
}
.card{
background:rgba(255,255,255,.2);
backdrop-filter:blur(15px);
padding:25px;
border-radius:20px;
text-align:center;
color:#fff;
width:90%;
max-width:340px;
box-shadow:0 0 25px #ff6ea8;
animation:fade 1s;
}
img{
width:140px;
height:140px;
border-radius:50%;
object-fit:cover;
border:4px solid #fff;
margin-bottom:15px;
}
h2{margin-bottom:10px}
p{line-height:1.6}
button{
margin-top:20px;
padding:10px 25px;
border:none;
border-radius:30px;
background:#ff4f8b;
color:#fff;
cursor:pointer;
font-size:16px;
}
button:hover{transform:scale(1.05)}
@keyframes fade{
from{opacity:0;transform:translateY(20px)}
to{opacity:1;transform:translateY(0)}
}
.heart{
position:absolute;
color:#fff;
animation:fall 5s linear infinite;
}
@keyframes fall{
0%{transform:translateY(-100vh)}
100%{transform:translateY(100vh)}
}
</style>
</head>
<body>

<div class="card">
<img src="https://files.catbox.moe/qhvr7n.jpg">
<h2>Adeeeeeeeeeeeek ❤️</h2>
<p>
Makasiiihhh yaaa udah hadir di hidup abaaaaaaaaaaangggg. 🤍<br><br>
Kalau adeeeeeeeek capeeee, sediiih, atau ngerasa sendirian... inget yaa, abaaaaaaaaaaangggg bakal selalu ada buat adeeeeeeeek. 🫂💗<br><br>
I Love You So Much ❤️
</p>
<button onclick="playMusic()">Peluk Jauh 🤍</button>
</div>

<audio id="music" preload="auto">
<source src="https://files.catbox.moe/08no1l.mp3" type="audio/mpeg">
</audio>

<script>
const music=document.getElementById("music");

function playMusic(){
music.play();
alert("I Love You Adeeeeeeeeeeeek ❤️");
}

setInterval(()=>{
let h=document.createElement("div");
h.className="heart";
h.innerHTML="❤️";
h.style.left=Math.random()*100+"vw";
h.style.fontSize=(15+Math.random()*20)+"px";
document.body.appendChild(h);
setTimeout(()=>h.remove(),5000);
},300);
</script>

</body>
</html> html>
